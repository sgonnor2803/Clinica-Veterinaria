<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Backend Test</title>
</head>
<body>
  <h1>🧪 Test Backend Supabase</h1>

  <button onclick="loadProducts()">Cargar productos</button>
  <button onclick="createProduct()">Crear producto test</button>

  <pre id="output">Esperando...</pre>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    const supabase = window.supabase.createClient(
      "https://rrmatjtqugrmjurbwrxz.supabase.co",
      "sb_publishable_8EWHi1ME2H68VplEc35aag_A7EhXEgj"
    );

    const output = document.getElementById("output");

    function log(data) {
      output.textContent = JSON.stringify(data, null, 2);
    }

    // 🔥 LEER PRODUCTOS
    async function loadProducts() {
      const { data, error } = await supabase
        .from("products")
        .select("*");

      if (error) return log(error);

      log(data);
    }

    // 🔥 CREAR PRODUCTO TEST
    async function createProduct() {
      const { data, error } = await supabase
        .from("products")
        .insert([
          {
            name: "Producto test",
            price: 10,
            type: "test"
          }
        ])
        .select();

      if (error) return log(error);

      log(data);
    }
  </script>
</body>
</html>
